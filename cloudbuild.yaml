steps:
  - name: 'flutter'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        flutter config --no-analytics
        flutter pub get
        flutter build web --release

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/travelbox-frontend:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/travelbox-frontend:latest'
      - '.'

images:
  - 'gcr.io/$PROJECT_ID/travelbox-frontend:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/travelbox-frontend:latest'
