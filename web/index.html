  <!-- Application Insights JS SDK — captura errores, page views y performance del frontend -->
  <!-- Application Insights frontend bootstrap disabled temporarily.
       The previous inline snippet was throwing before Flutter initialized. -->
  <style>
    :root {
      --travelbox-safe-top: env(safe-area-inset-top, 0px);
      --travelbox-safe-bottom: env(safe-area-inset-bottom, 0px);
      --travelbox-dvh: 100dvh;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: var(--travelbox-dvh);
      min-height: var(--travelbox-dvh);
      overflow: hidden;
      overscroll-behavior-y: none;
      background: #eff4fb;
    }

    body {
      position: fixed;
      inset: 0;
      padding-top: 0;
      padding-bottom: 0;
      touch-action: manipulation;
    }

    flt-glass-pane,
    flutter-view,
    #flt-glass-pane {
      width: 100%;
      height: 100%;
      min-height: 100%;
    }
  </style>
  <script>
    (function applyDynamicViewportHeight() {
      const update = () => {
        const viewportHeight = window.visualViewport
          ? window.visualViewport.height
          : window.innerHeight;
        document.documentElement.style.setProperty(
          '--travelbox-dvh',
          `${viewportHeight}px`,
        );
      };

      update();
      window.addEventListener('resize', update, { passive: true });
      window.addEventListener('orientationchange', update, { passive: true });
      if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', update, {
          passive: true,
        });
      }
    })();
  </script>
</head>
<body>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then((registrations) => {
        for (const registration of registrations) {
          registration.unregister();
        }
      });
    }
    if ('caches' in window) {
      caches.keys().then((keys) => {
        for (const key of keys) {
          caches.delete(key);
        }
      });
    }
  </script>
