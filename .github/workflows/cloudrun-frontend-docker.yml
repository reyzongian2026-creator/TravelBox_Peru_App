name: Deploy Cloud Run Frontend (Docker Build)

on:
  workflow_dispatch:
    inputs:
      secrets_mode:
        description: "Origen de secretos"
        required: true
        default: keyvault
        type: choice
        options:
          - keyvault
          - env
      project_id:
        description: "GCP Project ID"
        required: true
        default: travelboxperudb
        type: string
      region:
        description: "Region Cloud Run"
        required: true
        default: us-central1
        type: string
      frontend_service_name:
        description: "Servicio frontend Cloud Run"
        required: true
        default: travelbox-frontend-prod
        type: string
      backend_service_name:
        description: "Servicio backend para API_BASE_URL"
        required: true
        default: travelbox-backend-prod
        type: string
      azure_keyvault_name:
        description: "Azure Key Vault (si mode=keyvault)"
        required: true
        default: kvtravelboxpe
        type: string
      api_base_url_override:
        description: "API base url manual (opcional)"
        required: false
        default: ""
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: cloudrun-docker-${{ github.ref }}-${{ inputs.project_id }}
  cancel-in-progress: false

jobs:
  deploy-frontend-docker:
    runs-on: ubuntu-latest
    env:
      PROJECT_ID: ${{ inputs.project_id }}
      REGION: ${{ inputs.region }}
      FRONTEND_SERVICE_NAME: ${{ inputs.frontend_service_name }}
      BACKEND_SERVICE_NAME: ${{ inputs.backend_service_name }}
      API_BASE_URL_OVERRIDE: ${{ inputs.api_base_url_override }}
      AZURE_KEYVAULT_NAME: ${{ inputs.azure_keyvault_name }}
      SECRETS_MODE: ${{ inputs.secrets_mode }}

    steps:
      - name: Checkout frontend repo
        uses: actions/checkout@v4

      - name: Select GCP auth method
        id: gcp_auth
        shell: bash
        env:
          GCP_WIF_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          GCP_WIF_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
        run: |
          set -euo pipefail
          has_wif="false"
          has_key="false"

          if [[ -n "${GCP_WIF_PROVIDER}" && -n "${GCP_WIF_SERVICE_ACCOUNT}" ]]; then
            has_wif="true"
          fi
          if [[ -n "${GCP_SERVICE_ACCOUNT_KEY}" ]]; then
            has_key="true"
          fi

          if [[ "${has_wif}" == "true" ]]; then
            echo "auth_method=wif" >> "${GITHUB_OUTPUT}"
            if [[ "${has_key}" == "true" ]]; then
              echo "Both WIF and Service Account Key are configured; prioritizing WIF."
            fi
            exit 0
          fi

          if [[ "${has_key}" == "true" ]]; then
            echo "auth_method=key" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "::error::Missing GCP auth configuration. Set either (GCP_WORKLOAD_IDENTITY_PROVIDER + GCP_SERVICE_ACCOUNT) OR GCP_SERVICE_ACCOUNT_KEY in GitHub Actions secrets."
          exit 1

      - name: Authenticate to Google Cloud (Workload Identity)
        if: ${{ steps.gcp_auth.outputs.auth_method == 'wif' }}
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Authenticate to Google Cloud (Service Account Key)
        if: ${{ steps.gcp_auth.outputs.auth_method == 'key' }}
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ inputs.project_id }}

      - name: Login Azure (keyvault mode)
        if: ${{ inputs.secrets_mode == 'keyvault' }}
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS_JSON }}

      - name: Load secrets from Azure Key Vault
        if: ${{ inputs.secrets_mode == 'keyvault' }}
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $vault = "${{ inputs.azure_keyvault_name }}"
          function Test-PlaceholderSecret([string]$value) {
            if ([string]::IsNullOrWhiteSpace($value)) { return $false }
            $normalized = $value.ToLowerInvariant().Replace(" ", "")
            return @(
              "changeme","change-me","replace-me","replace_me","placeholder","dummy","todo","tbd","__pending_meta__"
            ) -contains $normalized
          }
          $map = @(
            @{ secret = "tbx-app-firebase-api-key"; env = "FIREBASE_API_KEY"; required = $true },
            @{ secret = "tbx-app-firebase-project-id"; env = "FIREBASE_PROJECT_ID"; required = $true },
            @{ secret = "tbx-app-firebase-messaging-sender-id"; env = "FIREBASE_MESSAGING_SENDER_ID"; required = $true },
            @{ secret = "tbx-app-firebase-storage-bucket"; env = "FIREBASE_STORAGE_BUCKET"; required = $false },
            @{ secret = "tbx-app-firebase-auth-domain"; env = "FIREBASE_AUTH_DOMAIN"; required = $false },
            @{ secret = "tbx-app-google-server-client-id"; env = "FIREBASE_GOOGLE_SERVER_CLIENT_ID"; required = $false },
            @{ secret = "tbx-app-firebase-ios-bundle-id"; env = "FIREBASE_IOS_BUNDLE_ID"; required = $false },
            @{ secret = "tbx-app-firebase-android-app-id"; env = "FIREBASE_ANDROID_APP_ID"; required = $false },
            @{ secret = "tbx-app-firebase-ios-app-id"; env = "FIREBASE_IOS_APP_ID"; required = $false },
            @{ secret = "tbx-app-firebase-web-app-id"; env = "FIREBASE_WEB_APP_ID"; required = $false },
            @{ secret = "tbx-app-firebase-facebook-enabled"; env = "FIREBASE_FACEBOOK_ENABLED"; required = $false },
            @{ secret = "tbx-auth-facebook-app-id"; env = "FIREBASE_FACEBOOK_APP_ID"; required = $false },
            @{ secret = "tbx-app-google-maps-api-key"; env = "GOOGLE_MAPS_API_KEY"; required = $false }
          )

          foreach ($item in $map) {
            $value = az keyvault secret show --vault-name $vault --name $item.secret --query value -o tsv 2>$null
            if ($LASTEXITCODE -ne 0 -or [string]::IsNullOrWhiteSpace($value)) {
              if ($item.required) {
                throw "Falta secret requerido en Key Vault: $($item.secret)"
              }
              continue
            }
            if (Test-PlaceholderSecret $value) {
              throw "Secret de Key Vault con valor placeholder: $($item.secret)"
            }
            "$($item.env)=$value" >> $env:GITHUB_ENV
          }

      - name: Load secrets from GitHub Secrets (env mode)
        if: ${{ inputs.secrets_mode == 'env' }}
        shell: bash
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_GOOGLE_SERVER_CLIENT_ID: ${{ secrets.FIREBASE_GOOGLE_SERVER_CLIENT_ID }}
          FIREBASE_IOS_BUNDLE_ID: ${{ secrets.FIREBASE_IOS_BUNDLE_ID }}
          FIREBASE_ANDROID_APP_ID: ${{ secrets.FIREBASE_ANDROID_APP_ID }}
          FIREBASE_IOS_APP_ID: ${{ secrets.FIREBASE_IOS_APP_ID }}
          FIREBASE_WEB_APP_ID: ${{ secrets.FIREBASE_WEB_APP_ID }}
          FIREBASE_FACEBOOK_ENABLED: ${{ secrets.FIREBASE_FACEBOOK_ENABLED }}
          FIREBASE_FACEBOOK_APP_ID: ${{ secrets.FIREBASE_FACEBOOK_APP_ID }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
        run: |
          set -euo pipefail
          is_placeholder_secret() {
            local normalized="${1,,}"
            normalized="${normalized// /}"
            case "$normalized" in
              changeme|change-me|replace-me|replace_me|placeholder|dummy|todo|tbd|__pending_meta__)
                return 0
                ;;
              *)
                return 1
                ;;
            esac
          }
          required=(FIREBASE_API_KEY FIREBASE_PROJECT_ID FIREBASE_MESSAGING_SENDER_ID)
          for key in "${required[@]}"; do
            value="${!key:-}"
            if [[ -z "${value}" ]]; then
              echo "Missing required GitHub secret: ${key}" >&2
              exit 1
            fi
            if is_placeholder_secret "${value}"; then
              echo "GitHub secret ${key} still looks like a placeholder" >&2
              exit 1
            fi
          done
          {
            echo "FIREBASE_API_KEY=${FIREBASE_API_KEY}"
            echo "FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}"
            echo "FIREBASE_MESSAGING_SENDER_ID=${FIREBASE_MESSAGING_SENDER_ID}"
            echo "FIREBASE_STORAGE_BUCKET=${FIREBASE_STORAGE_BUCKET}"
            echo "FIREBASE_AUTH_DOMAIN=${FIREBASE_AUTH_DOMAIN}"
            echo "FIREBASE_GOOGLE_SERVER_CLIENT_ID=${FIREBASE_GOOGLE_SERVER_CLIENT_ID}"
            echo "FIREBASE_IOS_BUNDLE_ID=${FIREBASE_IOS_BUNDLE_ID}"
            echo "FIREBASE_ANDROID_APP_ID=${FIREBASE_ANDROID_APP_ID}"
            echo "FIREBASE_IOS_APP_ID=${FIREBASE_IOS_APP_ID}"
            echo "FIREBASE_WEB_APP_ID=${FIREBASE_WEB_APP_ID}"
            echo "FIREBASE_FACEBOOK_ENABLED=${FIREBASE_FACEBOOK_ENABLED:-true}"
            echo "FIREBASE_FACEBOOK_APP_ID=${FIREBASE_FACEBOOK_APP_ID}"
          } >> "${GITHUB_ENV}"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Resolve backend URL
        id: resolve_backend
        shell: bash
        run: |
          set -euo pipefail
          api_base="${{ inputs.api_base_url_override }}"
          if [[ -z "${api_base}" ]]; then
            backend_url="$(gcloud run services describe "${BACKEND_SERVICE_NAME}" --platform managed --region "${REGION}" --project "${PROJECT_ID}" --format='value(status.url)' 2>/dev/null || true)"
            if [[ -n "${backend_url}" ]]; then
              api_base="${backend_url}/api/v1"
            fi
          fi
          if [[ -z "${api_base}" ]]; then
            echo "WARNING: Could not resolve backend URL. Using empty API_BASE_URL."
            api_base=""
          fi
          echo "API_BASE_URL=${api_base}" >> "${GITHUB_ENV}"
          echo "api_base=${api_base}" >> "${GITHUB_OUTPUT}"

      - name: Build frontend web (prod)
        run: |
          set -euo pipefail
          api_base="${{ env.API_BASE_URL || '' }}"
          echo "Building with API_BASE_URL=${api_base}"
          flutter build web --release \
            --dart-define=APP_ENV=prod \
            --dart-define=USE_MOCK_FALLBACK=false \
            --dart-define=API_BASE_URL="${api_base}" \
            --dart-define=FORCE_CASH_PAYMENTS_ONLY="false" \
            --dart-define=FIREBASE_API_KEY="${FIREBASE_API_KEY}" \
            --dart-define=FIREBASE_PROJECT_ID="${FIREBASE_PROJECT_ID}" \
            --dart-define=FIREBASE_MESSAGING_SENDER_ID="${FIREBASE_MESSAGING_SENDER_ID}" \
            --dart-define=FIREBASE_STORAGE_BUCKET="${FIREBASE_STORAGE_BUCKET}" \
            --dart-define=FIREBASE_AUTH_DOMAIN="${FIREBASE_AUTH_DOMAIN}" \
            --dart-define=FIREBASE_GOOGLE_SERVER_CLIENT_ID="${FIREBASE_GOOGLE_SERVER_CLIENT_ID}" \
            --dart-define=FIREBASE_IOS_BUNDLE_ID="${FIREBASE_IOS_BUNDLE_ID}" \
            --dart-define=FIREBASE_ANDROID_APP_ID="${FIREBASE_ANDROID_APP_ID}" \
            --dart-define=FIREBASE_IOS_APP_ID="${FIREBASE_IOS_APP_ID}" \
            --dart-define=FIREBASE_WEB_APP_ID="${FIREBASE_WEB_APP_ID}" \
            --dart-define=FIREBASE_FACEBOOK_ENABLED="${FIREBASE_FACEBOOK_ENABLED:-true}" \
            --dart-define=FIREBASE_FACEBOOK_APP_ID="${FIREBASE_FACEBOOK_APP_ID}" \
            --dart-define=GOOGLE_MAPS_API_KEY="${GOOGLE_MAPS_API_KEY}"

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${REGION}-docker.pkg.dev

      - name: Build and push Docker image
        run: |
          set -euo pipefail
          IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${FRONTEND_SERVICE_NAME}/${FRONTEND_SERVICE_NAME}"
          docker build -t "${IMAGE}:${{ github.sha }}" -t "${IMAGE}:latest" .
          docker push "${IMAGE}:${{ github.sha }}"
          docker push "${IMAGE}:latest"

      - name: Deploy to Cloud Run
        run: |
          set -euo pipefail
          IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${FRONTEND_SERVICE_NAME}/${FRONTEND_SERVICE_NAME}:${{ github.sha }}"
          gcloud run deploy "${FRONTEND_SERVICE_NAME}" \
            --image "${IMAGE}" \
            --platform managed \
            --region "${REGION}" \
            --project "${PROJECT_ID}" \
            --allow-unauthenticated \
            --port 8080 \
            --quiet

      - name: Deployment summary
        run: |
          set -euo pipefail
          frontend_url="$(gcloud run services describe "${FRONTEND_SERVICE_NAME}" --platform managed --region "${REGION}" --project "${PROJECT_ID}" --format='value(status.url)' 2>/dev/null || true)"
          echo "Frontend URL: ${frontend_url:-not-found}"
          echo "GitHub SHA: ${{ github.sha }}"
          echo "Secrets mode: ${SECRETS_MODE}"
          echo "KeyVault: ${AZURE_KEYVAULT_NAME}"
