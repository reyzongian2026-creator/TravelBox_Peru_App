name: Deploy Frontend to Azure

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'

      - name: Install Flutter dependencies
        run: |
          flutter config --no-analytics
          flutter pub get

      - name: Build Flutter Web
        run: |
          flutter build web --release --base-href=/ \
            --dart-define=USE_MOCK_FALLBACK=false \
            --dart-define=API_BASE_URL=https://api.inkavoy.pe/api/v1

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure App Service
        run: |
          cd build
          zip -r web.zip .
          az webapp deploy \
            --name travelbox-frontend-prod \
            --resource-group travelbox-peru-rg \
            --src-path web.zip
        shell: bash

      - name: Restart App Service
        run: az webapp restart --name travelbox-frontend-prod --resource-group travelbox-peru-rg
