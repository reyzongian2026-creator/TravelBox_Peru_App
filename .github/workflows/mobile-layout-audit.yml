name: Mobile Layout Audit

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - "lib/**"
      - "web/**"
      - "tools/mobile_layout_audit.cjs"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/mobile-layout-audit.yml"

jobs:
  mobile-layout-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Build web bundle
        run: flutter build web --release

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit

      - name: Serve web build
        run: |
          python3 -m http.server 8088 --directory build/web &
          echo $! > /tmp/travelbox_web_pid

      - name: Run mobile layout audit
        env:
          BASE_URL: http://127.0.0.1:8088
        run: node tools/mobile_layout_audit.cjs

      - name: Upload layout screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-layout-audit
          path: artifacts/mobile-layout-audit-*/
          if-no-files-found: error

      - name: Stop web server
        if: always()
        run: |
          if [ -f /tmp/travelbox_web_pid ]; then
            kill "$(cat /tmp/travelbox_web_pid)" || true
          fi
