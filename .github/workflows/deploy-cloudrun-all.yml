name: Deploy Cloud Run (All Types)

on:
  workflow_call:
    inputs:
      deploy_target:
        required: false
        type: string
        default: full
      secrets_mode:
        required: false
        type: string
        default: env
      project_id:
        required: false
        type: string
        default: travelboxperudb
      region:
        required: false
        type: string
        default: us-central1
      frontend_service_name:
        required: false
        type: string
        default: travelbox-frontend-prod
      backend_service_name:
        required: false
        type: string
        default: travelbox-backend-prod
      backend_repository:
        required: false
        type: string
        default: reyzongian2026-creator/TravelBox_Peru_Backend
      backend_ref:
        required: false
        type: string
        default: main
      azure_keyvault_name:
        required: false
        type: string
        default: kvtravelboxpe
      backend_vpc_connector:
        required: false
        type: string
        default: travelbox-run-connector
      backend_vpc_egress:
        required: false
        type: string
        default: all-traffic
      backend_timeout_seconds:
        required: false
        type: string
        default: "600"
      backend_memory:
        required: false
        type: string
        default: 1Gi
      backend_cpu:
        required: false
        type: string
        default: "1"
      backend_concurrency:
        required: false
        type: string
        default: "40"
      backend_min_instances:
        required: false
        type: string
        default: "0"
      backend_max_instances:
        required: false
        type: string
        default: "12"
      force_cash_payments_only:
        required: false
        type: string
        default: "false"
      api_base_url_override:
        required: false
        type: string
        default: ""
      dry_run:
        required: false
        type: string
        default: "false"
    secrets:
      GCP_WORKLOAD_IDENTITY_PROVIDER:
        required: false
      GCP_SERVICE_ACCOUNT:
        required: false
      GCP_SERVICE_ACCOUNT_KEY:
        required: false
      CROSS_REPO_PAT:
        required: false
      AZURE_CREDENTIALS_JSON:
        required: false
      AZURE_CLIENT_ID:
        required: false
      AZURE_CLIENT_SECRET:
        required: false
      AZURE_TENANT_ID:
        required: false
      FIREBASE_API_KEY:
        required: false
      FIREBASE_PROJECT_ID:
        required: false
      FIREBASE_MESSAGING_SENDER_ID:
        required: false
      FIREBASE_STORAGE_BUCKET:
        required: false
      FIREBASE_AUTH_DOMAIN:
        required: false
      FIREBASE_GOOGLE_SERVER_CLIENT_ID:
        required: false
      FIREBASE_IOS_BUNDLE_ID:
        required: false
      FIREBASE_ANDROID_APP_ID:
        required: false
      FIREBASE_IOS_APP_ID:
        required: false
      FIREBASE_WEB_APP_ID:
        required: false
      FIREBASE_FACEBOOK_ENABLED:
        required: false
      FIREBASE_FACEBOOK_APP_ID:
        required: false
  workflow_dispatch:
    inputs:
      deploy_target:
        description: "Tipo de despliegue"
        required: true
        default: full
        type: choice
        options:
          - full
          - frontend_only
          - backend_only
      secrets_mode:
        description: "Origen de secretos para build/deploy"
        required: true
        default: env
        type: choice
        options:
          - keyvault
          - env
      project_id:
        description: "GCP Project ID"
        required: true
        default: travelboxperudb
        type: string
      region:
        description: "Region Cloud Run"
        required: true
        default: us-central1
        type: string
      frontend_service_name:
        description: "Servicio frontend Cloud Run"
        required: true
        default: travelbox-frontend-prod
        type: string
      backend_service_name:
        description: "Servicio backend Cloud Run"
        required: true
        default: travelbox-backend-prod
        type: string
      backend_repository:
        description: "Repo backend (owner/name)"
        required: true
        default: reyzongian2026-creator/TravelBox_Peru_Backend
        type: string
      backend_ref:
        description: "Branch/tag backend"
        required: true
        default: main
        type: string
      azure_keyvault_name:
        description: "Azure Key Vault (si mode=keyvault)"
        required: true
        default: kvtravelboxpe
        type: string
      backend_vpc_connector:
        description: "VPC connector backend (vacio para omitir)"
        required: false
        default: travelbox-run-connector
        type: string
      backend_vpc_egress:
        description: "VPC egress backend"
        required: true
        default: all-traffic
        type: choice
        options:
          - all-traffic
          - private-ranges-only
      backend_timeout_seconds:
        description: "Timeout backend (seg)"
        required: true
        default: "600"
        type: string
      backend_memory:
        description: "Memoria backend"
        required: true
        default: 1Gi
        type: string
      backend_cpu:
        description: "CPU backend"
        required: true
        default: "1"
        type: string
      backend_concurrency:
        description: "Concurrencia backend"
        required: true
        default: "40"
        type: string
      backend_min_instances:
        description: "Min instances backend"
        required: true
        default: "0"
        type: string
      backend_max_instances:
        description: "Max instances backend"
        required: true
        default: "12"
        type: string
      force_cash_payments_only:
        description: "FORCE_CASH_PAYMENTS_ONLY"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      api_base_url_override:
        description: "API base url manual para frontend_only (opcional)"
        required: false
        default: ""
        type: string
      dry_run:
        description: "Solo imprime comandos (no despliega)"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-cloudrun-${{ github.ref }}-${{ inputs.deploy_target }}-${{ inputs.project_id }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      PROJECT_ID: ${{ inputs.project_id }}
      REGION: ${{ inputs.region }}
      FRONTEND_SERVICE_NAME: ${{ inputs.frontend_service_name }}
      BACKEND_SERVICE_NAME: ${{ inputs.backend_service_name }}
      DEPLOY_TARGET: ${{ inputs.deploy_target }}
      SECRETS_MODE: ${{ inputs.secrets_mode }}
      BACKEND_VPC_CONNECTOR: ${{ inputs.backend_vpc_connector }}
      BACKEND_VPC_EGRESS: ${{ inputs.backend_vpc_egress }}
      BACKEND_TIMEOUT_SECONDS: ${{ inputs.backend_timeout_seconds }}
      BACKEND_MEMORY: ${{ inputs.backend_memory }}
      BACKEND_CPU: ${{ inputs.backend_cpu }}
      BACKEND_CONCURRENCY: ${{ inputs.backend_concurrency }}
      BACKEND_MIN_INSTANCES: ${{ inputs.backend_min_instances }}
      BACKEND_MAX_INSTANCES: ${{ inputs.backend_max_instances }}
      FORCE_CASH_PAYMENTS_ONLY: ${{ inputs.force_cash_payments_only }}
      API_BASE_URL_OVERRIDE: ${{ inputs.api_base_url_override }}
      DRY_RUN: ${{ inputs.dry_run }}

    steps:
      - name: Checkout frontend repo
        uses: actions/checkout@v4

      - name: Checkout backend repo
        if: ${{ inputs.deploy_target == 'full' || inputs.deploy_target == 'backend_only' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.backend_repository }}
          ref: ${{ inputs.backend_ref }}
          path: TravelBox_Peru_Backend
          token: ${{ secrets.CROSS_REPO_PAT != '' && secrets.CROSS_REPO_PAT || github.token }}

      - name: Select GCP auth method
        id: gcp_auth
        shell: bash
        env:
          GCP_WIF_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          GCP_WIF_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
        run: |
          set -euo pipefail
          has_wif="false"
          has_key="false"

          if [[ -n "${GCP_WIF_PROVIDER}" && -n "${GCP_WIF_SERVICE_ACCOUNT}" ]]; then
            has_wif="true"
          fi
          if [[ -n "${GCP_SERVICE_ACCOUNT_KEY}" ]]; then
            has_key="true"
          fi

          if [[ "${has_wif}" == "true" ]]; then
            echo "auth_method=wif" >> "${GITHUB_OUTPUT}"
            if [[ "${has_key}" == "true" ]]; then
              echo "Both WIF and Service Account Key are configured; prioritizing WIF."
            fi
            exit 0
          fi

          if [[ "${has_key}" == "true" ]]; then
            echo "auth_method=key" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "::error::Missing GCP auth configuration. Set either (GCP_WORKLOAD_IDENTITY_PROVIDER + GCP_SERVICE_ACCOUNT) OR GCP_SERVICE_ACCOUNT_KEY in GitHub Actions secrets."
          exit 1

      - name: Authenticate to Google Cloud (Workload Identity)
        if: ${{ steps.gcp_auth.outputs.auth_method == 'wif' }}
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Authenticate to Google Cloud (Service Account Key)
        if: ${{ steps.gcp_auth.outputs.auth_method == 'key' }}
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ inputs.project_id }}

      - name: Enable required Google APIs
        run: |
          gcloud services enable \
            run.googleapis.com \
            cloudbuild.googleapis.com \
            artifactregistry.googleapis.com \
            compute.googleapis.com \
            vpcaccess.googleapis.com \
            --project "${PROJECT_ID}" \
            --quiet

      - name: Setup Java for backend checks
        if: ${{ inputs.deploy_target == 'full' || inputs.deploy_target == 'backend_only' }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Backend compile smoke check
        if: ${{ inputs.deploy_target == 'full' || inputs.deploy_target == 'backend_only' }}
        working-directory: TravelBox_Peru_Backend
        shell: bash
        run: |
          chmod +x mvnw
          ./mvnw -DskipTests compile

      - name: Setup Flutter for frontend
        if: ${{ inputs.deploy_target == 'full' || inputs.deploy_target == 'frontend_only' }}
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Login Azure (keyvault mode)
        if: ${{ inputs.secrets_mode == 'keyvault' }}
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS_JSON }}

      - name: Load secrets from Azure Key Vault
        if: ${{ inputs.secrets_mode == 'keyvault' }}
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $vault = "${{ inputs.azure_keyvault_name }}"
          function Test-PlaceholderSecret([string]$value) {
            if ([string]::IsNullOrWhiteSpace($value)) { return $false }
            $normalized = $value.ToLowerInvariant().Replace(" ", "")
            return @(
              "changeme","change-me","replace-me","replace_me","placeholder","dummy","todo","tbd","__pending_meta__"
            ) -contains $normalized
          }
          $map = @(
            @{ secret = "tbx-azure-client-id"; env = "AZURE_CLIENT_ID"; required = $true },
            @{ secret = "tbx-azure-client-secret"; env = "AZURE_CLIENT_SECRET"; required = $true },
            @{ secret = "tbx-azure-tenant-id"; env = "AZURE_TENANT_ID"; required = $true },
            @{ secret = "tbx-app-firebase-api-key"; env = "FIREBASE_API_KEY"; required = $true },
            @{ secret = "tbx-app-firebase-project-id"; env = "FIREBASE_PROJECT_ID"; required = $true },
            @{ secret = "tbx-app-firebase-messaging-sender-id"; env = "FIREBASE_MESSAGING_SENDER_ID"; required = $true },
            @{ secret = "tbx-app-firebase-storage-bucket"; env = "FIREBASE_STORAGE_BUCKET"; required = $false },
            @{ secret = "tbx-app-firebase-auth-domain"; env = "FIREBASE_AUTH_DOMAIN"; required = $false },
            @{ secret = "tbx-app-google-server-client-id"; env = "FIREBASE_GOOGLE_SERVER_CLIENT_ID"; required = $false },
            @{ secret = "tbx-app-firebase-ios-bundle-id"; env = "FIREBASE_IOS_BUNDLE_ID"; required = $false },
            @{ secret = "tbx-app-firebase-android-app-id"; env = "FIREBASE_ANDROID_APP_ID"; required = $false },
            @{ secret = "tbx-app-firebase-ios-app-id"; env = "FIREBASE_IOS_APP_ID"; required = $false },
            @{ secret = "tbx-app-firebase-web-app-id"; env = "FIREBASE_WEB_APP_ID"; required = $false },
            @{ secret = "tbx-app-firebase-facebook-enabled"; env = "FIREBASE_FACEBOOK_ENABLED"; required = $false },
            @{ secret = "tbx-auth-facebook-app-id"; env = "FIREBASE_FACEBOOK_APP_ID"; required = $false },
            @{ secret = "tbx-app-google-maps-api-key"; env = "GOOGLE_MAPS_API_KEY"; required = $false },
            @{ secret = "tbx-back-azure-storage-images-connection-string"; env = "AZURE_STORAGE_IMAGES_CONNECTION_STRING"; required = $false },
            @{ secret = "tbx-back-azure-storage-reports-connection-string"; env = "AZURE_STORAGE_REPORTS_CONNECTION_STRING"; required = $false },
            @{ secret = "tbx-back-encryption-key"; env = "APP_SECURITY_ENCRYPTION_KEY"; required = $false }
          )

          foreach ($item in $map) {
            $value = az keyvault secret show --vault-name $vault --name $item.secret --query value -o tsv 2>$null
            if ($LASTEXITCODE -ne 0 -or [string]::IsNullOrWhiteSpace($value)) {
              if ($item.required) {
                throw "Falta secret requerido en Key Vault: $($item.secret)"
              }
              continue
            }
            if (Test-PlaceholderSecret $value) {
              throw "Secret de Key Vault con valor placeholder: $($item.secret)"
            }
            "$($item.env)=$value" >> $env:GITHUB_ENV
          }

      - name: Load secrets from GitHub Secrets (env mode)
        if: ${{ inputs.secrets_mode == 'env' }}
        shell: bash
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_GOOGLE_SERVER_CLIENT_ID: ${{ secrets.FIREBASE_GOOGLE_SERVER_CLIENT_ID }}
          FIREBASE_IOS_BUNDLE_ID: ${{ secrets.FIREBASE_IOS_BUNDLE_ID }}
          FIREBASE_ANDROID_APP_ID: ${{ secrets.FIREBASE_ANDROID_APP_ID }}
          FIREBASE_IOS_APP_ID: ${{ secrets.FIREBASE_IOS_APP_ID }}
          FIREBASE_WEB_APP_ID: ${{ secrets.FIREBASE_WEB_APP_ID }}
          FIREBASE_FACEBOOK_ENABLED: ${{ secrets.FIREBASE_FACEBOOK_ENABLED }}
          FIREBASE_FACEBOOK_APP_ID: ${{ secrets.FIREBASE_FACEBOOK_APP_ID }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
        run: |
          set -euo pipefail
          is_placeholder_secret() {
            local normalized="${1,,}"
            normalized="${normalized// /}"
            case "$normalized" in
              changeme|change-me|replace-me|replace_me|placeholder|dummy|todo|tbd|__pending_meta__)
                return 0
                ;;
              *)
                return 1
                ;;
            esac
          }
          required=(AZURE_CLIENT_ID AZURE_CLIENT_SECRET AZURE_TENANT_ID FIREBASE_API_KEY FIREBASE_PROJECT_ID FIREBASE_MESSAGING_SENDER_ID)
          for key in "${required[@]}"; do
            value="${!key:-}"
            if [[ -z "${value}" ]]; then
              echo "Missing required GitHub secret: ${key}" >&2
              exit 1
            fi
            if is_placeholder_secret "${value}"; then
              echo "GitHub secret ${key} still looks like a placeholder" >&2
              exit 1
            fi
          done
          {
            echo "AZURE_CLIENT_ID=${AZURE_CLIENT_ID}"
            echo "AZURE_CLIENT_SECRET=${AZURE_CLIENT_SECRET}"
            echo "AZURE_TENANT_ID=${AZURE_TENANT_ID}"
            echo "FIREBASE_API_KEY=${FIREBASE_API_KEY}"
            echo "FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}"
            echo "FIREBASE_MESSAGING_SENDER_ID=${FIREBASE_MESSAGING_SENDER_ID}"
            echo "FIREBASE_STORAGE_BUCKET=${FIREBASE_STORAGE_BUCKET}"
            echo "FIREBASE_AUTH_DOMAIN=${FIREBASE_AUTH_DOMAIN}"
            echo "FIREBASE_GOOGLE_SERVER_CLIENT_ID=${FIREBASE_GOOGLE_SERVER_CLIENT_ID}"
            echo "FIREBASE_IOS_BUNDLE_ID=${FIREBASE_IOS_BUNDLE_ID}"
            echo "FIREBASE_ANDROID_APP_ID=${FIREBASE_ANDROID_APP_ID}"
            echo "FIREBASE_IOS_APP_ID=${FIREBASE_IOS_APP_ID}"
            echo "FIREBASE_WEB_APP_ID=${FIREBASE_WEB_APP_ID}"
            echo "FIREBASE_FACEBOOK_ENABLED=${FIREBASE_FACEBOOK_ENABLED:-true}"
            echo "FIREBASE_FACEBOOK_APP_ID=${FIREBASE_FACEBOOK_APP_ID}"
          } >> "${GITHUB_ENV}"

      - name: Deploy backend to Cloud Run
        if: ${{ inputs.deploy_target == 'full' || inputs.deploy_target == 'backend_only' }}
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          function Get-ServiceUrl([string]$serviceName) {
            if ([string]::IsNullOrWhiteSpace($serviceName)) {
              return ""
            }
            $resolved = gcloud run services describe $serviceName `
              --platform managed `
              --region "${env:REGION}" `
              --project "${env:PROJECT_ID}" `
              --format "value(status.url)" 2>$null
            if ($LASTEXITCODE -ne 0) {
              return ""
            }
            return "$resolved".Trim()
          }

          $frontendUrl = Get-ServiceUrl "${env:FRONTEND_SERVICE_NAME}"
          $backendPublicUrl = Get-ServiceUrl "${env:BACKEND_SERVICE_NAME}"

          $backendEnvFile = Join-Path $PWD "backend-env.generated.yaml"
          $lines = @(
            "SPRING_PROFILES_ACTIVE: prod",
            "APP_BOOTSTRAP_ENABLED: `"false`"",
            "APP_BOOTSTRAP_SEED_OPERATIONAL_DEMO: `"false`"",
            "APP_BOOTSTRAP_MINIMAL_SEED_ONLY: `"false`"",
            "APP_BOOTSTRAP_QUICK_SEED: `"true`"",
            "APP_CORS_ALLOWED_ORIGINS: `"https://*.run.app,http://localhost:*,http://127.0.0.1:*`"",
            "APP_AUTH_ALLOW_INTERNAL_SELF_REGISTER: `"true`"",
            "APP_NOTIFICATION_PROVIDER: `"firebase`"",
            "APP_PAYMENT_PROVIDER: `"culqi`"",
            "APP_PAYMENTS_FORCE_CASH_ONLY: `"${env:FORCE_CASH_PAYMENTS_ONLY}`"",
            "APP_PAYMENTS_ALLOW_MOCK_CONFIRMATION: `"false`"",
            "APP_ROUTING_PROVIDER: `"google`"",
            "APP_ROUTING_ALLOW_MOCK_FALLBACK: `"false`"",
            "APP_ROUTING_GOOGLE_BASE_URL: `"https://routes.googleapis.com`"",
            "APP_TRANSLATION_PROVIDER: `"google`"",
            "APP_TRANSLATION_ALLOW_FALLBACK: `"true`"",
            "AZURE_KEYVAULT_ENABLED: `"true`"",
            "AZURE_KEYVAULT_ENDPOINT: `"https://${{ inputs.azure_keyvault_name }}.vault.azure.net/`"",
            "AZURE_CLIENT_ID: `"${env:AZURE_CLIENT_ID}`"",
            "AZURE_CLIENT_SECRET: `"${env:AZURE_CLIENT_SECRET}`"",
            "AZURE_TENANT_ID: `"${env:AZURE_TENANT_ID}`"",
            "AZURE_STORAGE_IMAGES_CONNECTION_STRING: `"${env:AZURE_STORAGE_IMAGES_CONNECTION_STRING}`"",
            "AZURE_STORAGE_REPORTS_CONNECTION_STRING: `"${env:AZURE_STORAGE_REPORTS_CONNECTION_STRING}`"",
            "APP_SECURITY_ENCRYPTION_KEY: `"${env:APP_SECURITY_ENCRYPTION_KEY}`""
          )
          if (-not [string]::IsNullOrWhiteSpace($frontendUrl)) {
            $lines += "APP_FRONTEND_BASE_URL: `"$frontendUrl`""
          }
          if (-not [string]::IsNullOrWhiteSpace($backendPublicUrl)) {
            $lines += "APP_PUBLIC_BASE_URL: `"$backendPublicUrl`""
          }
          Set-Content -Path $backendEnvFile -Value ($lines -join [Environment]::NewLine) -Encoding UTF8

          $args = @(
            "run", "deploy", "${env:BACKEND_SERVICE_NAME}",
            "--source", "TravelBox_Peru_Backend",
            "--project", "${env:PROJECT_ID}",
            "--region", "${env:REGION}",
            "--platform", "managed",
            "--allow-unauthenticated",
            "--port", "8080",
            "--memory", "${env:BACKEND_MEMORY}",
            "--cpu", "${env:BACKEND_CPU}",
            "--concurrency", "${env:BACKEND_CONCURRENCY}",
            "--min-instances", "${env:BACKEND_MIN_INSTANCES}",
            "--max-instances", "${env:BACKEND_MAX_INSTANCES}",
            "--timeout", "${env:BACKEND_TIMEOUT_SECONDS}",
            "--env-vars-file", $backendEnvFile,
            "--quiet"
          )
          if (-not [string]::IsNullOrWhiteSpace("${env:BACKEND_VPC_CONNECTOR}")) {
            $args += @("--vpc-connector", "${env:BACKEND_VPC_CONNECTOR}", "--vpc-egress", "${env:BACKEND_VPC_EGRESS}")
          }
          if ("${env:DRY_RUN}" -eq "true") {
            Write-Host ("DRY_RUN: gcloud {0}" -f ($args -join " "))
          } else {
            gcloud @args
          }

      - name: Resolve backend URL
        if: ${{ inputs.deploy_target == 'full' || inputs.deploy_target == 'frontend_only' || inputs.deploy_target == 'backend_only' }}
        shell: bash
        run: |
          set -euo pipefail
          backend_url="$(gcloud run services describe "${BACKEND_SERVICE_NAME}" --platform managed --region "${REGION}" --project "${PROJECT_ID}" --format='value(status.url)' 2>/dev/null || true)"
          if [[ -n "${backend_url}" ]]; then
            echo "BACKEND_URL=${backend_url}" >> "${GITHUB_ENV}"
            echo "backend_url=${backend_url}" >> "${GITHUB_OUTPUT}"
          fi

      - name: Flutter pub get
        if: ${{ inputs.deploy_target == 'full' || inputs.deploy_target == 'frontend_only' }}
        run: flutter pub get

      - name: Build frontend web (prod)
        if: ${{ inputs.deploy_target == 'full' || inputs.deploy_target == 'frontend_only' }}
        shell: bash
        run: |
          set -euo pipefail
          api_base="${API_BASE_URL_OVERRIDE}"
          if [[ -z "${api_base}" ]]; then
            if [[ -n "${BACKEND_URL:-}" ]]; then
              api_base="${BACKEND_URL}/api/v1"
            else
              api_base="$(gcloud run services describe "${BACKEND_SERVICE_NAME}" --platform managed --region "${REGION}" --project "${PROJECT_ID}" --format='value(status.url)')/api/v1"
            fi
          fi
          echo "API_BASE_URL_EFFECTIVE=${api_base}" >> "${GITHUB_ENV}"

          flutter build web --release \
            --dart-define=APP_ENV=prod \
            --dart-define=USE_MOCK_FALLBACK=false \
            --dart-define=API_BASE_URL="${api_base}" \
            --dart-define=FORCE_CASH_PAYMENTS_ONLY="${FORCE_CASH_PAYMENTS_ONLY}" \
            --dart-define=FIREBASE_API_KEY="${FIREBASE_API_KEY}" \
            --dart-define=FIREBASE_PROJECT_ID="${FIREBASE_PROJECT_ID}" \
            --dart-define=FIREBASE_MESSAGING_SENDER_ID="${FIREBASE_MESSAGING_SENDER_ID}" \
            --dart-define=FIREBASE_STORAGE_BUCKET="${FIREBASE_STORAGE_BUCKET}" \
            --dart-define=FIREBASE_AUTH_DOMAIN="${FIREBASE_AUTH_DOMAIN}" \
            --dart-define=FIREBASE_GOOGLE_SERVER_CLIENT_ID="${FIREBASE_GOOGLE_SERVER_CLIENT_ID}" \
            --dart-define=FIREBASE_IOS_BUNDLE_ID="${FIREBASE_IOS_BUNDLE_ID}" \
            --dart-define=FIREBASE_ANDROID_APP_ID="${FIREBASE_ANDROID_APP_ID}" \
            --dart-define=FIREBASE_IOS_APP_ID="${FIREBASE_IOS_APP_ID}" \
            --dart-define=FIREBASE_WEB_APP_ID="${FIREBASE_WEB_APP_ID}" \
            --dart-define=FIREBASE_FACEBOOK_ENABLED="${FIREBASE_FACEBOOK_ENABLED:-true}" \
            --dart-define=FIREBASE_FACEBOOK_APP_ID="${FIREBASE_FACEBOOK_APP_ID}" \
            --dart-define=GOOGLE_MAPS_API_KEY="${GOOGLE_MAPS_API_KEY}"

      - name: Deploy frontend to Cloud Run
        if: ${{ inputs.deploy_target == 'full' || inputs.deploy_target == 'frontend_only' }}
        shell: bash
        run: |
          set -euo pipefail
          cmd=(
            gcloud run deploy "${FRONTEND_SERVICE_NAME}"
            --source .
            --project "${PROJECT_ID}"
            --region "${REGION}"
            --platform managed
            --allow-unauthenticated
            --port 8080
            --quiet
          )
          if [[ "${DRY_RUN}" == "true" ]]; then
            printf 'DRY_RUN: %q ' "${cmd[@]}"
            echo
          else
            "${cmd[@]}"
          fi

      - name: Deployment summary
        shell: bash
        run: |
          set -euo pipefail
          backend_url="$(gcloud run services describe "${BACKEND_SERVICE_NAME}" --platform managed --region "${REGION}" --project "${PROJECT_ID}" --format='value(status.url)' 2>/dev/null || true)"
          frontend_url="$(gcloud run services describe "${FRONTEND_SERVICE_NAME}" --platform managed --region "${REGION}" --project "${PROJECT_ID}" --format='value(status.url)' 2>/dev/null || true)"
          echo "Deploy target: ${DEPLOY_TARGET}"
          echo "Secrets mode: ${SECRETS_MODE}"
          echo "Project: ${PROJECT_ID}"
          echo "Region: ${REGION}"
          echo "Backend URL: ${backend_url:-not-found}"
          echo "Frontend URL: ${frontend_url:-not-found}"
          echo "API_BASE_URL used for frontend build: ${API_BASE_URL_EFFECTIVE:-not-set}"
