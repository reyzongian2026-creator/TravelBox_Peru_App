            ) -contains $normalized
          }
          $required = @("FIREBASE_API_KEY","FIREBASE_PROJECT_ID","FIREBASE_MESSAGING_SENDER_ID")
          foreach ($key in $required) {
            $value = (Get-Item "Env:$key").Value
            if ([string]::IsNullOrWhiteSpace($value)) {
              throw "Missing required GitHub secret: $key"
            }
