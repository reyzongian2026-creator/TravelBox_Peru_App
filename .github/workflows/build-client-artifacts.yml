name: Build Client Artifacts (Android / iOS / Windows)

on:
  workflow_call:
    inputs:
      target:
        required: false
        type: string
        default: all
      secrets_mode:
        required: false
        type: string
        default: env
      azure_keyvault_name:
        required: false
        type: string
        default: kvtravelboxpe
      app_env:
        required: false
        type: string
        default: prod
      api_base_url:
        required: false
        type: string
        default: https://api.inkavoy.pe/api/v1
      force_cash_payments_only:
        required: false
        type: string
        default: "false"
    secrets:
      AZURE_CREDENTIALS_JSON:
        required: false
      GOOGLE_MAPS_API_KEY:
        required: false
      AZURE_CLIENT_ID:
        required: false
      AZURE_TENANT_ID:
        required: false
      AZURE_MAPS_API_KEY:
        required: false
      ANDROID_RELEASE_KEYSTORE_BASE64:
        required: false
      ANDROID_RELEASE_STORE_PASSWORD:
        required: false
      ANDROID_RELEASE_KEY_ALIAS:
        required: false
      ANDROID_RELEASE_KEY_PASSWORD:
        required: false
  workflow_dispatch:
    inputs:
      target:
        description: "Plataforma a compilar"
        required: true
        default: all
        type: choice
        options:
          - all
          - android
          - ios
          - windows
      secrets_mode:
        description: "Origen de secretos de Azure/Maps"
        required: true
        default: env
        type: choice
        options:
          - keyvault
          - env
      azure_keyvault_name:
        description: "Azure Key Vault (si mode=keyvault)"
        required: true
        default: kvtravelboxpe
        type: string
      app_env:
        description: "APP_ENV para build"
        required: true
        default: prod
        type: string
      api_base_url:
        description: "API_BASE_URL para la app"
        required: true
        default: https://api.inkavoy.pe/api/v1
        type: string
      force_cash_payments_only:
        description: "FORCE_CASH_PAYMENTS_ONLY"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read
  id-token: write

jobs:
  build-android:
    if: ${{ inputs.target == 'all' || inputs.target == 'android' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Login Azure (keyvault mode)
        if: ${{ inputs.secrets_mode == 'keyvault' }}
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS_JSON }}

      - name: Load app secrets
        shell: pwsh
        env:
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_MAPS_API_KEY: ${{ secrets.AZURE_MAPS_API_KEY }}
        run: |
          $ErrorActionPreference = "Stop"

          if ("${{ inputs.secrets_mode }}" -eq "keyvault") {
            $vault = "${{ inputs.azure_keyvault_name }}"
            $map = @(
              @{ secret = "tbx-azure-client-id"; env = "AZURE_CLIENT_ID"; required = $true },
              @{ secret = "tbx-azure-tenant-id"; env = "AZURE_TENANT_ID"; required = $true },
              @{ secret = "tbx-azure-maps-api-key"; env = "AZURE_MAPS_API_KEY"; required = $false }
            )
            foreach ($item in $map) {
              $value = az keyvault secret show --vault-name $vault --name $item.secret --query value -o tsv 2>$null
              if ($LASTEXITCODE -ne 0 -or [string]::IsNullOrWhiteSpace($value)) {
                if ($item.required) { throw "Falta secret requerido en Key Vault: $($item.secret)" }
                continue
              }
              "$($item.env)=$value" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
            }
          } else {
            foreach ($key in @("GOOGLE_MAPS_API_KEY","AZURE_CLIENT_ID","AZURE_TENANT_ID","AZURE_MAPS_API_KEY")) {
              $value = (Get-Item "Env:$key" -ErrorAction SilentlyContinue).Value
              if ($null -eq $value) { $value = "" }
              "$key=$value" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
            }
          }

      - name: Flutter pub get
        run: flutter pub get

      - name: Configure Android release signing
        shell: bash
        env:
          ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
          ANDROID_RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_STORE_PASSWORD }}
          ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          : "${ANDROID_RELEASE_KEYSTORE_BASE64:?Missing ANDROID_RELEASE_KEYSTORE_BASE64}"
          : "${ANDROID_RELEASE_STORE_PASSWORD:?Missing ANDROID_RELEASE_STORE_PASSWORD}"
          : "${ANDROID_RELEASE_KEY_ALIAS:?Missing ANDROID_RELEASE_KEY_ALIAS}"
          : "${ANDROID_RELEASE_KEY_PASSWORD:?Missing ANDROID_RELEASE_KEY_PASSWORD}"
          echo "$ANDROID_RELEASE_KEYSTORE_BASE64" | base64 --decode > android/inkavoy-release.jks
          cat > android/key.properties <<EOF
          storeFile=../inkavoy-release.jks
          storePassword=$ANDROID_RELEASE_STORE_PASSWORD
          keyAlias=$ANDROID_RELEASE_KEY_ALIAS
          keyPassword=$ANDROID_RELEASE_KEY_PASSWORD
          EOF

      - name: Build Android APK (release)
        shell: bash
        run: |
          flutter build apk --release \
            --dart-define=APP_ENV=${{ inputs.app_env }} \
            --dart-define=USE_MOCK_FALLBACK=false \
            --dart-define=API_BASE_URL=${{ inputs.api_base_url }} \
            --dart-define=FORCE_CASH_PAYMENTS_ONLY=${{ inputs.force_cash_payments_only }} \
            --dart-define=GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY:-} \
            --dart-define=AZURE_MAPS_API_KEY=${AZURE_MAPS_API_KEY:-} \
            --dart-define=AZURE_CLIENT_ID=${AZURE_CLIENT_ID} \
            --dart-define=AZURE_TENANT_ID=${AZURE_TENANT_ID}

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: travelbox-android-apk-release
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

  build-ios:
    if: ${{ inputs.target == 'all' || inputs.target == 'ios' }}
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Login Azure (keyvault mode)
        if: ${{ inputs.secrets_mode == 'keyvault' }}
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS_JSON }}

      - name: Load app secrets
        shell: pwsh
        env:
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_MAPS_API_KEY: ${{ secrets.AZURE_MAPS_API_KEY }}
        run: |
          $ErrorActionPreference = "Stop"

          if ("${{ inputs.secrets_mode }}" -eq "keyvault") {
            $vault = "${{ inputs.azure_keyvault_name }}"
            $map = @(
              @{ secret = "tbx-azure-client-id"; env = "AZURE_CLIENT_ID"; required = $true },
              @{ secret = "tbx-azure-tenant-id"; env = "AZURE_TENANT_ID"; required = $true },
              @{ secret = "tbx-azure-maps-api-key"; env = "AZURE_MAPS_API_KEY"; required = $false }
            )
            foreach ($item in $map) {
              $value = az keyvault secret show --vault-name $vault --name $item.secret --query value -o tsv 2>$null
              if ($LASTEXITCODE -ne 0 -or [string]::IsNullOrWhiteSpace($value)) {
                if ($item.required) { throw "Falta secret requerido en Key Vault: $($item.secret)" }
                continue
              }
              "$($item.env)=$value" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
            }
          } else {
            foreach ($key in @("GOOGLE_MAPS_API_KEY","AZURE_CLIENT_ID","AZURE_TENANT_ID","AZURE_MAPS_API_KEY")) {
              $value = (Get-Item "Env:$key" -ErrorAction SilentlyContinue).Value
              if ($null -eq $value) { $value = "" }
              "$key=$value" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
            }
          }

      - name: Flutter pub get
        run: flutter pub get

      - name: Build iOS app (unsigned)
        shell: bash
        run: |
          flutter build ios --release --no-codesign \
            --dart-define=APP_ENV=${{ inputs.app_env }} \
            --dart-define=USE_MOCK_FALLBACK=false \
            --dart-define=API_BASE_URL=${{ inputs.api_base_url }} \
            --dart-define=FORCE_CASH_PAYMENTS_ONLY=${{ inputs.force_cash_payments_only }} \
            --dart-define=GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY:-} \
            --dart-define=AZURE_MAPS_API_KEY=${AZURE_MAPS_API_KEY:-} \
            --dart-define=AZURE_CLIENT_ID=${AZURE_CLIENT_ID} \
            --dart-define=AZURE_TENANT_ID=${AZURE_TENANT_ID}

      - name: Package iOS artifact
        shell: bash
        run: |
          set -euo pipefail
          test -d build/ios/iphoneos/Runner.app
          ditto -c -k --sequesterRsrc --keepParent build/ios/iphoneos/Runner.app build/ios/travelbox-ios-runner.app.zip

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: travelbox-ios-runner-app-unsigned
          path: build/ios/travelbox-ios-runner.app.zip
          if-no-files-found: error

  build-windows:
    if: ${{ inputs.target == 'all' || inputs.target == 'windows' }}
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Login Azure (keyvault mode)
        if: ${{ inputs.secrets_mode == 'keyvault' }}
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS_JSON }}

      - name: Load app secrets
        shell: pwsh
        env:
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_MAPS_API_KEY: ${{ secrets.AZURE_MAPS_API_KEY }}
        run: |
          $ErrorActionPreference = "Stop"

          if ("${{ inputs.secrets_mode }}" -eq "keyvault") {
            $vault = "${{ inputs.azure_keyvault_name }}"
            $map = @(
              @{ secret = "tbx-azure-client-id"; env = "AZURE_CLIENT_ID"; required = $true },
              @{ secret = "tbx-azure-tenant-id"; env = "AZURE_TENANT_ID"; required = $true },
              @{ secret = "tbx-azure-maps-api-key"; env = "AZURE_MAPS_API_KEY"; required = $false }
            )
            foreach ($item in $map) {
              $value = az keyvault secret show --vault-name $vault --name $item.secret --query value -o tsv 2>$null
              if ($LASTEXITCODE -ne 0 -or [string]::IsNullOrWhiteSpace($value)) {
                if ($item.required) { throw "Falta secret requerido en Key Vault: $($item.secret)" }
                continue
              }
              "$($item.env)=$value" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
            }
          } else {
            foreach ($key in @("GOOGLE_MAPS_API_KEY","AZURE_CLIENT_ID","AZURE_TENANT_ID","AZURE_MAPS_API_KEY")) {
              $value = (Get-Item "Env:$key" -ErrorAction SilentlyContinue).Value
              if ($null -eq $value) { $value = "" }
              "$key=$value" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
            }
          }

      - name: Enable Windows desktop and dependencies
        shell: pwsh
        run: |
          flutter config --enable-windows-desktop
          flutter pub get

      - name: Build Windows app (release)
        shell: pwsh
        run: |
          flutter build windows --release `
            --dart-define=APP_ENV=${{ inputs.app_env }} `
            --dart-define=USE_MOCK_FALLBACK=false `
            --dart-define=API_BASE_URL=${{ inputs.api_base_url }} `
            --dart-define=FORCE_CASH_PAYMENTS_ONLY=${{ inputs.force_cash_payments_only }} `
            --dart-define=GOOGLE_MAPS_API_KEY=$env:GOOGLE_MAPS_API_KEY `
            --dart-define=AZURE_MAPS_API_KEY=$env:AZURE_MAPS_API_KEY `
            --dart-define=AZURE_CLIENT_ID=$env:AZURE_CLIENT_ID `
            --dart-define=AZURE_TENANT_ID=$env:AZURE_TENANT_ID

      - name: Package Windows artifact
        shell: pwsh
        run: |
          $releaseDir = "build/windows/x64/runner/Release"
          if (-not (Test-Path $releaseDir)) {
            throw "No se encontro salida de build Windows en: $releaseDir"
          }
          $zipPath = "build/windows/travelbox-windows-release.zip"
          if (Test-Path $zipPath) {
            Remove-Item -Force $zipPath
          }
          Compress-Archive -Path "$releaseDir\*" -DestinationPath $zipPath -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: travelbox-windows-release
          path: build/windows/travelbox-windows-release.zip
          if-no-files-found: error
