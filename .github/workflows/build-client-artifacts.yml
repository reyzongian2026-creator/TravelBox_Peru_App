            }
            "$key=$value" >> $env:GITHUB_ENV
          }

      - name: Flutter pub get
        run: flutter pub get

      - name: Build iOS app (unsigned)
        shell: pwsh
        run: |
          $defines = @(
            "--dart-define=APP_ENV=${{ inputs.app_env }}",
            "--dart-define=USE_MOCK_FALLBACK=false",
