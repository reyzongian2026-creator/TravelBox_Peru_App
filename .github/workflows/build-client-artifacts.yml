name: Build Client Artifacts (Android/iOS/Windows)

on:
  workflow_call:
    inputs:
      target:
        required: false
        type: string
        default: all
      secrets_mode:
        required: false
        type: string
        default: env
      azure_keyvault_name:
        required: false
        type: string
        default: kvtravelboxpe
      app_env:
        required: false
        type: string
        default: prod
      api_base_url:
        required: false
        type: string
        default: https://travelbox-backend-prod-otpbbcgoeq-uc.a.run.app/api/v1
      force_cash_payments_only:
        required: false
        type: string
        default: "false"
    secrets:
      AZURE_CREDENTIALS_JSON:
        required: false
      FIREBASE_API_KEY:
        required: false
      FIREBASE_PROJECT_ID:
        required: false
      FIREBASE_MESSAGING_SENDER_ID:
        required: false
      FIREBASE_STORAGE_BUCKET:
        required: false
      FIREBASE_AUTH_DOMAIN:
        required: false
      FIREBASE_GOOGLE_SERVER_CLIENT_ID:
        required: false
      FIREBASE_IOS_BUNDLE_ID:
        required: false
      FIREBASE_ANDROID_APP_ID:
        required: false
      FIREBASE_IOS_APP_ID:
        required: false
      FIREBASE_WEB_APP_ID:
        required: false
      FIREBASE_FACEBOOK_ENABLED:
        required: false
      FIREBASE_FACEBOOK_APP_ID:
        required: false
      GOOGLE_MAPS_API_KEY:
        required: false
  workflow_dispatch:
    inputs:
      target:
        description: "Plataforma a compilar"
        required: true
        default: all
        type: choice
        options:
          - all
          - android
          - ios
          - windows
      secrets_mode:
        description: "Origen de secretos para FIREBASE_*"
        required: true
        default: env
        type: choice
        options:
          - keyvault
          - env
      azure_keyvault_name:
        description: "Azure Key Vault (si mode=keyvault)"
        required: true
        default: kvtravelboxpe
        type: string
      app_env:
        description: "APP_ENV para build"
        required: true
        default: prod
        type: string
      api_base_url:
        description: "API_BASE_URL para la app"
        required: true
        default: https://travelbox-backend-prod-otpbbcgoeq-uc.a.run.app/api/v1
        type: string
      force_cash_payments_only:
        description: "FORCE_CASH_PAYMENTS_ONLY"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read
  id-token: write

jobs:
  build-android:
    if: ${{ inputs.target == 'all' || inputs.target == 'android' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Login Azure (keyvault mode)
        if: ${{ inputs.secrets_mode == 'keyvault' }}
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS_JSON }}

      - name: Load FIREBASE_* from Azure Key Vault
        if: ${{ inputs.secrets_mode == 'keyvault' }}
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $vault = "${{ inputs.azure_keyvault_name }}"
          $map = @(
            @{ secret = "tbx-app-firebase-api-key"; env = "FIREBASE_API_KEY"; required = $true },
            @{ secret = "tbx-app-firebase-project-id"; env = "FIREBASE_PROJECT_ID"; required = $true },
            @{ secret = "tbx-app-firebase-messaging-sender-id"; env = "FIREBASE_MESSAGING_SENDER_ID"; required = $true },
            @{ secret = "tbx-app-firebase-storage-bucket"; env = "FIREBASE_STORAGE_BUCKET"; required = $false },
            @{ secret = "tbx-app-firebase-auth-domain"; env = "FIREBASE_AUTH_DOMAIN"; required = $false },
            @{ secret = "tbx-app-google-server-client-id"; env = "FIREBASE_GOOGLE_SERVER_CLIENT_ID"; required = $false },
            @{ secret = "tbx-app-firebase-ios-bundle-id"; env = "FIREBASE_IOS_BUNDLE_ID"; required = $false },
            @{ secret = "tbx-app-firebase-android-app-id"; env = "FIREBASE_ANDROID_APP_ID"; required = $false },
            @{ secret = "tbx-app-firebase-ios-app-id"; env = "FIREBASE_IOS_APP_ID"; required = $false },
            @{ secret = "tbx-app-firebase-web-app-id"; env = "FIREBASE_WEB_APP_ID"; required = $false },
            @{ secret = "tbx-app-firebase-facebook-enabled"; env = "FIREBASE_FACEBOOK_ENABLED"; required = $false },
            @{ secret = "tbx-auth-facebook-app-id"; env = "FIREBASE_FACEBOOK_APP_ID"; required = $false }
          )

          foreach ($item in $map) {
            $value = az keyvault secret show --vault-name $vault --name $item.secret --query value -o tsv 2>$null
            if ($LASTEXITCODE -ne 0 -or [string]::IsNullOrWhiteSpace($value)) {
              if ($item.required) {
                throw "Falta secret requerido en Key Vault: $($item.secret)"
              }
              continue
            }
            "$($item.env)=$value" >> $env:GITHUB_ENV
          }
          $fbEnabled = $env:FIREBASE_FACEBOOK_ENABLED
          if ([string]::IsNullOrWhiteSpace($fbEnabled)) {
            $fbEnabled = "true"
          }
          "FIREBASE_FACEBOOK_ENABLED=$fbEnabled" >> $env:GITHUB_ENV

      - name: Load FIREBASE_* from GitHub secrets (env mode)
        if: ${{ inputs.secrets_mode == 'env' }}
        shell: pwsh
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_GOOGLE_SERVER_CLIENT_ID: ${{ secrets.FIREBASE_GOOGLE_SERVER_CLIENT_ID }}
          FIREBASE_IOS_BUNDLE_ID: ${{ secrets.FIREBASE_IOS_BUNDLE_ID }}
          FIREBASE_ANDROID_APP_ID: ${{ secrets.FIREBASE_ANDROID_APP_ID }}
          FIREBASE_IOS_APP_ID: ${{ secrets.FIREBASE_IOS_APP_ID }}
          FIREBASE_WEB_APP_ID: ${{ secrets.FIREBASE_WEB_APP_ID }}
          FIREBASE_FACEBOOK_ENABLED: ${{ secrets.FIREBASE_FACEBOOK_ENABLED }}
          FIREBASE_FACEBOOK_APP_ID: ${{ secrets.FIREBASE_FACEBOOK_APP_ID }}
        run: |
          $ErrorActionPreference = "Stop"
          function Test-PlaceholderSecret([string]$value) {
            if ([string]::IsNullOrWhiteSpace($value)) { return $false }
            $normalized = $value.ToLowerInvariant().Replace(" ", "")
            return @(
              "changeme","change-me","replace-me","replace_me","placeholder","dummy","todo","tbd","__pending_meta__"
            ) -contains $normalized
          }
          $required = @("FIREBASE_API_KEY","FIREBASE_PROJECT_ID","FIREBASE_MESSAGING_SENDER_ID")
          foreach ($key in $required) {
            $value = (Get-Item "Env:$key").Value
            if ([string]::IsNullOrWhiteSpace($value)) {
              throw "Missing required GitHub secret: $key"
            }
            if (Test-PlaceholderSecret $value) {
              throw "GitHub secret still looks like placeholder: $key"
            }
          }
          $all = @(
            "FIREBASE_API_KEY","FIREBASE_PROJECT_ID","FIREBASE_MESSAGING_SENDER_ID",
            "FIREBASE_STORAGE_BUCKET","FIREBASE_AUTH_DOMAIN","FIREBASE_GOOGLE_SERVER_CLIENT_ID",
            "FIREBASE_IOS_BUNDLE_ID","FIREBASE_ANDROID_APP_ID","FIREBASE_IOS_APP_ID",
            "FIREBASE_WEB_APP_ID","FIREBASE_FACEBOOK_ENABLED","FIREBASE_FACEBOOK_APP_ID",
            "GOOGLE_MAPS_API_KEY"
          )
          foreach ($key in $all) {
            $value = (Get-Item "Env:$key" -ErrorAction SilentlyContinue).Value
            if ($null -eq $value) { $value = "" }
            if (-not [string]::IsNullOrWhiteSpace($value) -and (Test-PlaceholderSecret $value)) {
              throw "GitHub secret still looks like placeholder: $key"
            }
            "$key=$value" >> $env:GITHUB_ENV
          }

      - name: Flutter pub get
        run: flutter pub get

      - name: Build Android APK (release)
        shell: pwsh
        run: |
          $defines = @(
            "--dart-define=APP_ENV=${{ inputs.app_env }}",
            "--dart-define=USE_MOCK_FALLBACK=false",
            "--dart-define=API_BASE_URL=${{ inputs.api_base_url }}",
            "--dart-define=FORCE_CASH_PAYMENTS_ONLY=${{ inputs.force_cash_payments_only }}",
            "--dart-define=FIREBASE_API_KEY=$env:FIREBASE_API_KEY",
            "--dart-define=FIREBASE_PROJECT_ID=$env:FIREBASE_PROJECT_ID",
            "--dart-define=FIREBASE_MESSAGING_SENDER_ID=$env:FIREBASE_MESSAGING_SENDER_ID",
            "--dart-define=FIREBASE_STORAGE_BUCKET=$env:FIREBASE_STORAGE_BUCKET",
            "--dart-define=FIREBASE_AUTH_DOMAIN=$env:FIREBASE_AUTH_DOMAIN",
            "--dart-define=FIREBASE_GOOGLE_SERVER_CLIENT_ID=$env:FIREBASE_GOOGLE_SERVER_CLIENT_ID",
            "--dart-define=FIREBASE_IOS_BUNDLE_ID=$env:FIREBASE_IOS_BUNDLE_ID",
            "--dart-define=FIREBASE_ANDROID_APP_ID=$env:FIREBASE_ANDROID_APP_ID",
            "--dart-define=FIREBASE_IOS_APP_ID=$env:FIREBASE_IOS_APP_ID",
            "--dart-define=FIREBASE_WEB_APP_ID=$env:FIREBASE_WEB_APP_ID",
            "--dart-define=FIREBASE_FACEBOOK_ENABLED=$env:FIREBASE_FACEBOOK_ENABLED",
            "--dart-define=FIREBASE_FACEBOOK_APP_ID=$env:FIREBASE_FACEBOOK_APP_ID"
          )
          flutter build apk --release $defines

      - name: Upload Android artifact
        uses: actions/upload-artifact@v5
        with:
          name: travelbox-android-apk-release
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

  build-ios:
    if: ${{ inputs.target == 'all' || inputs.target == 'ios' }}
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
