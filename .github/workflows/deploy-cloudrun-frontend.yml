name: Deploy Cloud Run Frontend

on:
  workflow_dispatch:
    inputs:
      secrets_mode:
        description: "Origen de secretos"
        required: true
        default: env
        type: choice
        options:
          - keyvault
          - env
      project_id:
        description: "GCP Project ID"
        required: true
        default: travelboxperudb
        type: string
      region:
        description: "Region Cloud Run"
        required: true
        default: us-central1
        type: string
      frontend_service_name:
        description: "Servicio frontend Cloud Run"
        required: true
        default: travelbox-frontend-prod
        type: string
      backend_service_name:
        description: "Servicio backend para resolver API_BASE_URL"
        required: true
        default: travelbox-backend-prod
        type: string
      api_base_url_override:
        description: "API base url manual (opcional)"
        required: false
        default: ""
        type: string
      azure_keyvault_name:
        description: "Azure Key Vault (si mode=keyvault)"
        required: true
        default: kvtravelboxpe
        type: string
      force_cash_payments_only:
        description: "FORCE_CASH_PAYMENTS_ONLY"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      dry_run:
        description: "Solo imprime comandos (no despliega)"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read
  id-token: write

jobs:
  deploy-frontend:
    uses: ./.github/workflows/deploy-cloudrun-all.yml
    with:
      deploy_target: frontend_only
      secrets_mode: ${{ inputs.secrets_mode }}
      project_id: ${{ inputs.project_id }}
      region: ${{ inputs.region }}
      frontend_service_name: ${{ inputs.frontend_service_name }}
      backend_service_name: ${{ inputs.backend_service_name }}
      api_base_url_override: ${{ inputs.api_base_url_override }}
      azure_keyvault_name: ${{ inputs.azure_keyvault_name }}
      force_cash_payments_only: ${{ inputs.force_cash_payments_only }}
      dry_run: ${{ inputs.dry_run }}
    secrets: inherit
