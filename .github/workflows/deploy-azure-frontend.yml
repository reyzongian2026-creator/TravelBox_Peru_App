name: Deploy to Azure (Frontend)

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_SUBSCRIPTION: "33815caa-4cfb-4a9e-b60a-8fee5caa2b08"
  STATIC_WEB_APP_NAME: "travelbox-frontend"

permissions:
  contents: read
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.41.5'
          cache: true

      - name: Login Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS_JSON }}

      - name: Load secrets from Key Vault
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $vault = "kvtravelboxpe"
          $map = @(
            @{ secret = "tbx-app-firebase-api-key"; env = "FIREBASE_API_KEY"; required = $true },
            @{ secret = "tbx-app-firebase-project-id"; env = "FIREBASE_PROJECT_ID"; required = $true },
            @{ secret = "tbx-app-firebase-messaging-sender-id"; env = "FIREBASE_MESSAGING_SENDER_ID"; required = $true },
            @{ secret = "tbx-app-firebase-storage-bucket"; env = "FIREBASE_STORAGE_BUCKET"; required = $false },
            @{ secret = "tbx-app-firebase-auth-domain"; env = "FIREBASE_AUTH_DOMAIN"; required = $false },
            @{ secret = "tbx-app-firebase-ios-bundle-id"; env = "FIREBASE_IOS_BUNDLE_ID"; required = $false },
            @{ secret = "tbx-app-firebase-android-app-id"; env = "FIREBASE_ANDROID_APP_ID"; required = $false },
            @{ secret = "tbx-app-firebase-web-app-id"; env = "FIREBASE_WEB_APP_ID"; required = $false }
          )

          foreach ($item in $map) {
            $value = az keyvault secret show --vault-name $vault --name $item.secret --query value -o tsv 2>$null
            if ($LASTEXITCODE -ne 0 -or [string]::IsNullOrWhiteSpace($value)) {
              if ($item.required) {
                throw "Falta secret requerido en Key Vault: $($item.secret)"
              }
              continue
            }
            "$($item.env)=$value" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          }

      - name: Flutter pub get
        run: flutter pub get

      - name: Build Flutter web
        run: flutter build web --release
        env:
          API_BASE_URL: "https://travelbox-backend-prod.azurewebsites.net/api/v1"
          FIREBASE_API_KEY: ${{ env.FIREBASE_API_KEY }}
          FIREBASE_PROJECT_ID: ${{ env.FIREBASE_PROJECT_ID }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ env.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ env.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_AUTH_DOMAIN: ${{ env.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_IOS_BUNDLE_ID: ${{ env.FIREBASE_IOS_BUNDLE_ID }}
          FIREBASE_ANDROID_APP_ID: ${{ env.FIREBASE_ANDROID_APP_ID }}
          FIREBASE_WEB_APP_ID: ${{ env.FIREBASE_WEB_APP_ID }}

      - name: Deploy to Azure Static Web Apps
        id: deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "/build/web"
          output_location: "/"
