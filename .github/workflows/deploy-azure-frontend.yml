name: Deploy to Azure (Frontend)

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_SUBSCRIPTION: "33815caa-4cfb-4a9e-b60a-8fee5caa2b08"
  STATIC_WEB_APP_NAME: "travelbox-frontend"

permissions:
  contents: read
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.41.5'
          cache: true

      - name: Login Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS_JSON }}

      - name: Load secrets from Key Vault
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $vault = "kvtravelboxpe"
          $map = @(
            @{ secret = "tbx-azure-client-id"; env = "AZURE_CLIENT_ID"; required = $false },
            @{ secret = "tbx-azure-tenant-id"; env = "AZURE_TENANT_ID"; required = $false }
          )

          foreach ($item in $map) {
            $value = az keyvault secret show --vault-name $vault --name $item.secret --query value -o tsv 2>$null
            if ($LASTEXITCODE -ne 0 -or [string]::IsNullOrWhiteSpace($value)) {
              if ($item.required) {
                throw "Falta secret requerido en Key Vault: $($item.secret)"
              }
              continue
            }
            "$($item.env)=$value" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          }

      - name: Flutter pub get
        run: flutter pub get

      - name: Build Flutter web
        run: |
          flutter build web --release \
            --dart-define=USE_MOCK_FALLBACK=false \
            --dart-define=API_BASE_URL=https://api.inkavoy.pe/api/v1 \
            --dart-define=AZURE_CLIENT_ID=${{ env.AZURE_CLIENT_ID }} \
            --dart-define=AZURE_TENANT_ID=${{ env.AZURE_TENANT_ID }}

      - name: Deploy to Azure Static Web Apps
        id: deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "/build/web"
          output_location: "/"
