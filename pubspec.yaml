name: travelbox_peru_app
description: Frontend Flutter para plataforma de almacenamiento turistico en Peru.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.8.0+1
  dio_smart_retry: ^6.0.0
  file_picker: ^10.3.3
  flare_flutter:
    path: third_party/flare_flutter
  flutter_secure_storage: ^9.2.4
  firebase_auth: ^6.1.1
  firebase_core: ^4.2.0
  flutter_facebook_auth: ^7.1.2
  flutter_map: ^8.2.1
  flutter_local_notifications: ^19.4.2
  flutter_riverpod: ^2.6.1
  geolocator: ^14.0.2
  google_fonts: ^6.2.1
  google_sign_in: ^7.2.0
  go_router: ^16.2.4
  http_parser: ^4.1.2
  intl: ^0.20.2
  latlong2: ^0.9.1
  mobile_scanner: ^7.2.0
  permission_handler: ^12.0.1
  qr_flutter: ^4.1.0
  shared_preferences: ^2.5.3
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4
  flutter_native_splash: ^2.4.4

flutter:
  uses-material-design: true
  assets:
    - assets/onboarding/
    - assets/branding/

flutter_native_splash:
  color: "#EFF4FB"
  color_dark: "#1E1C2A"
  image: assets/branding/travelbox_peru_flat_reference.png
  android: true
  ios: true
  web: false
  fullscreen: true
